<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        {% include '_base_styles.html' %}

        body {
            background: {{ background_color | default('var(--color-text-primary)') }};
            display: flex;
            flex-direction: column;
            padding: var(--body-padding);
        }
        .title {
            font-size: var(--title-size);
            font-weight: 700;
            color: {{ text_color | default('var(--color-surface)') }};
            margin-bottom: var(--section-gap);
            line-height: 1.3;
            word-break: keep-all;
            overflow-wrap: break-word;
        }
        .summary {
            font-size: var(--body-size);
            color: {{ summary_color | default('#666666') }};
            line-height: 1.6;
            word-break: keep-all;
            overflow-wrap: break-word;
        }
    </style>
</head>
<body>
    <div class="title">{{ title }}</div>
    <div class="summary">{{ summary }}</div>
</body>
</html>
