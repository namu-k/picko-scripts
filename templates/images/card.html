<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1080px;
            height: 1080px;
            background-color: {{ background_color }};
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px;
            font-family: 'Noto Sans KR', sans-serif;
        }
        .title {
            font-size: 56px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 40px;
            line-height: 1.3;
        }
        .summary {
            font-size: 32px;
            color: #666666;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="title">{{ title }}</div>
    <div class="summary">{{ summary }}</div>
</body>
</html>
