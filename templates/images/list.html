<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        {% include '_base_styles.html' %}

        body {
            background: {{ background_color | default('var(--color-text-primary)') }};
            display: flex;
            flex-direction: column;
            padding: var(--body-padding);
        }
        .header {
            margin-bottom: 60px;
        }
        .title {
            font-size: var(--title-size);
            font-weight: 800;
            color: {{ title_color | default('var(--color-surface)') }};
            line-height: 1.3;
            word-break: keep-all;
            overflow-wrap: break-word;
        }
        .subtitle {
            font-size: 24px;
            color: {{ subtitle_color | default('#666666') }};
            margin-top: var(--element-gap);
        }
        .items {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: var(--gap);
        }
        .item {
            display: flex;
            align-items: flex-start;
            gap: var(--gap);
            padding: var(--card-padding);
            background: {{ item_background | default('#f8f9fa') }};
            border-radius: var(--border-radius);
            border-left: 6px solid var(--color-primary);
        }
        .item-number {
            width: 48px;
            height: 48px;
            background: var(--color-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: var(--title-weight);
            color: var(--color-text-primary);
            font-size: 22px;
            flex-shrink: 0;
        }
        .item-text {
            font-size: var(--body-size);
            color: {{ item_text_color | default('#333333') }};
            line-height: var(--line-height);
            word-break: keep-all;
            overflow-wrap: break-word;
            padding-top: 8px;
        }
        .footer {
            margin-top: var(--section-gap);
            padding-top: 30px;
            border-top: 2px solid {{ footer_border | default('#f0f0f0') }};
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .brand {
            font-size: 22px;
            font-weight: var(--title-weight);
            color: {{ brand_color | default('var(--color-surface)') }};
        }
        .date {
            font-size: 18px;
            color: {{ date_color | default('#999999') }};
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">{{ title }}</div>
        {% if subtitle %}<div class="subtitle">{{ subtitle }}</div>{% endif %}
    </div>
    <div class="items">
        {% for item in items %}
        <div class="item">
            <div class="item-number">{{ loop.index }}</div>
            <div class="item-text">{{ item }}</div>
        </div>
        {% endfor %}
    </div>
    <div class="footer">
        <div class="brand">{{ brand | default('SocialBuilders') }}</div>
        <div class="date">{{ date | default('2026') }}</div>
    </div>
</body>
</html>
