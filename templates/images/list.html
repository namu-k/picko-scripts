<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            position: relative;
            width: {{ width | default(1080) }}px;
            height: {{ height | default(1080) }}px;
            background: {{ background_color | default('#ffffff') }};
            display: flex;
            flex-direction: column;
            padding: 80px;
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .header {
            margin-bottom: 60px;
        }
        .title {
            font-size: 52px;
            font-weight: 800;
            color: #1a1a2e;
            line-height: 1.3;
            word-break: keep-all;
            overflow-wrap: break-word;
        }
        .subtitle {
            font-size: 24px;
            color: #666666;
            margin-top: 16px;
        }
        .items {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .item {
            display: flex;
            align-items: flex-start;
            gap: 24px;
            padding: 24px;
            background: #f8f9fa;
            border-radius: 16px;
            border-left: 6px solid #667eea;
        }
        .item-number {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            font-size: 22px;
            flex-shrink: 0;
        }
        .item-text {
            font-size: 28px;
            color: #333333;
            line-height: 1.4;
            word-break: keep-all;
            overflow-wrap: break-word;
            padding-top: 8px;
        }
        .footer {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .brand {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a2e;
        }
        .date {
            font-size: 18px;
            color: #999999;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">{{ title }}</div>
        {% if subtitle %}<div class="subtitle">{{ subtitle }}</div>{% endif %}
    </div>
    <div class="items">
        {% for item in items %}
        <div class="item">
            <div class="item-number">{{ loop.index }}</div>
            <div class="item-text">{{ item }}</div>
        </div>
        {% endfor %}
    </div>
    <div class="footer">
        <div class="brand">{{ brand | default('SocialBuilders') }}</div>
        <div class="date">{{ date | default('2026') }}</div>
    </div>
</body>
</html>
