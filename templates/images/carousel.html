<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            position: relative;
            width: {{ width | default(1080) }}px;
            height: {{ height | default(1080) }}px;
            background-color: {{ background_color }};
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px;
            font-family: 'Noto Sans KR', sans-serif;
        }
        .carousel-container {
            max-width: 100%;
        }
        .slide-number {
            font-size: 24px;
            font-weight: 600;
            color: #888888;
            margin-bottom: 30px;
        }
        .title {
            font-size: 52px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 40px;
            line-height: 1.3;
        }
        .content {
            font-size: 36px;
            color: #333333;
            line-height: 1.6;
            margin-bottom: 50px;
        }
        .cta {
            font-size: 32px;
            font-weight: 600;
            color: #4a90d9;
            margin-top: auto;
        }
        .pagination {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #d0d0d0;
        }
        .dot.active {
            background-color: #4a90d9;
        }
    </style>
</head>
<body>
    <div class="carousel-container">
        <div class="slide-number">{{ slide_number }} / {{ total_slides }}</div>
        <div class="title">{{ title }}</div>
        <div class="content">{{ content }}</div>
        {% if cta %}<div class="cta">{{ cta }}</div>{% endif %}
    </div>
    <div class="pagination">
        {% for i in range(total_slides) %}
        <div class="dot {% if i + 1 == slide_number %}active{% endif %}"></div>
        {% endfor %}
    </div>
</body>
</html>
