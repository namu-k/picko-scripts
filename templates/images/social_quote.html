<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            position: relative;
            width: {{ width | default(1080) }}px;
            height: {{ height | default(1080) }}px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 80px;
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            color: white;
        }
        .profile-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .name {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
        }
        .handle {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.7);
        }
        .quote-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .quote {
            font-size: 56px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.4;
            text-align: center;
            word-break: keep-all;
            overflow-wrap: break-word;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .brand {
            font-size: 24px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
        }
        .date {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="avatar">{{ avatar_text | default('S') }}</div>
        <div class="profile-info">
            <div class="name">{{ profile_name | default('SocialBuilders') }}</div>
            <div class="handle">{{ profile_handle | default('@socialbuilders') }}</div>
        </div>
    </div>
    <div class="quote-section">
        <div class="quote">{{ quote }}</div>
    </div>
    <div class="footer">
        <div class="brand">{{ brand | default('SocialBuilders') }}</div>
        <div class="date">{{ date | default('2026') }}</div>
    </div>
</body>
</html>
