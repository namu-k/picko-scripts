## 2. RSS 컬렉터 스펙

### 2.1 RSSCollector 클래스

```python
class RSSCollector(BaseCollector):
    """RSS 피드에서 콘텐츠 수집"""

    def __init__(self, config: Dict[str, Any]):
        super().__init__(config)
        self.feed_parser = None

    async def collect(self, source: SourceMeta) -> List[CollectedItem]:
        """
        RSS 피드에서 아이템 수집

        Args:
            source: SourceMeta 객체

        Returns:
            CollectedItem 리스트
        """
        # 1. 피드 다운로드
        feed_content = await self._download_feed(source.url)

        # 2. 피드 파싱
        feed_items = self._parse_feed(feed_content)

        # 3. CollectedItem으로 변환
        collected_items = []
        for item in feed_items:
            # 중복 검사
            if not await self._is_duplicate(item.link):
                collected_item = self._create_collected_item(item, source)
                collected_items.append(collected_item)

        return collected_items

    async def _download_feed(self, url: str) -> str:
        """RSS 피드 다운로드"""
        # HTTP 요청 및 파싱
        pass

    def _parse_feed(self, feed_content: str) -> List[Dict]:
        """피드 파싱"""
        # feedparser 사용
        pass

    def _create_collected_item(self, feed_item: Dict, source: SourceMeta) -> CollectedItem:
        """CollectedItem 객체 생성"""
        return CollectedItem(
            id=generate_id(feed_item.link),
            title=feed_item.title,
            content=feed_item.description or "",
            url=feed_item.link,
            source_url=source.url,
            published_at=parse_datetime(feed_item.published),
            source_type="rss",
            language=self._detect_language(feed_item.title),
            author=getattr(feed_item, 'author', None)
        )
```

### 2.2 지원 피드 형식

| 형식 | 지원 여부 | 설명 |
|------|----------|------|
| RSS 2.0 | ✅ 완전 지원 | 표준 RSS 2.0 |
| Atom 1.0 | ✅ 완전 지원 | Atom 1.0 피드 |
