## 8. 모니터링 및 로깅

### 8.1 컬렉터 로깅

```python
import logging
from picko.logger import get_logger

logger = get_logger(__name__)

class RSSCollector(BaseCollector):
    def __init__(self, config: Dict[str, Any]):
        super().__init__(config)
        self.logger = logger

    async def collect(self, source: SourceMeta) -> List[CollectedItem]:
        self.logger.info(f"Starting RSS collection for {source.url}")

        try:
            feed_content = await self._download_feed(source.url)
            feed_items = self._parse_feed(feed_content)

            self.logger.info(f"Found {len(feed_items)} items in feed")

            # 중복 제거 로깅
            unique_items = [item for item in feed_items if not await self._is_duplicate(item.link)]
            self.logger.info(f"Removed {len(feed_items) - len(unique_items)} duplicates")

            return unique_items

        except Exception as e:
            self.logger.error(f"Failed to collect from {source.url}: {str(e)}")
            raise
```

### 8.2 컬렉터 메트릭

```python
from prometheus_client import Counter, Histogram, Gauge

# 메트릭 정의
COLLECT_TOTAL = Counter('collector_total', 'Total collector executions', ['type'])
COLLECT_ERRORS = Counter('collector_errors', 'Collector errors', ['type'])
COLLECT_DURATION = Histogram('collector_duration_seconds', 'Collector execution time', ['type'])
COLLECTED_ITEMS = Gauge('collector_items', 'Number of collected items', ['type'])

class RSSCollector(BaseCollector):
    async def collect(self, source: SourceMeta) -> List[CollectedItem]:
        COLLECT_TOTAL.labels(type='rss').inc()

        start_time = time.time()

        try:
            # ... 수집 로직 ...
            duration = time.time() - start_time
            COLLECT_DURATION.labels(type='rss').observe(duration)
            COLLECTED_ITEMS.labels(type='rss').set(len(items))

            return items

        except Exception as e:
            COLLECT_ERRORS.labels(type='rss').inc()
            raise
```

