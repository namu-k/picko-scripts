## 3. Perplexity 컬렉터 스펙

### 3.1 PerplexityCollector 클래스

```python
class PerplexityCollector(BaseCollector):
    """Perplexity Task 결과 수집"""

    def __init__(self, config: Dict[str, Any]):
        super().__init__(config)
        self.input_dir = config.get('input_dir', 'Inbox/Perplexity')
        self.archive_dir = config.get('archive_dir', 'Archive/Perplexity')

    async def collect(self, source: SourceMeta) -> List[CollectedItem]:
        """
        Perplexity 결과 파일에서 콘텐츠 수집

        Args:
            source: SourceMeta 객체 (실제로는 사용하지 않음)

        Returns:
            CollectedItem 리스트
        """
        # 1. 입력 디렉토리 스캔
        files = await self._scan_input_dir()

        # 2. 파일 파싱
        collected_items = []
        for file_path in files:
            item = await self._parse_file(file_path)
            if item:
                collected_items.append(item)

        # 3. 파일 아카이브
        await self._archive_files(files)

        return collected_items

    async def _scan_input_dir(self) -> List[str]:
        """입력 디렉토리에서 파일 스캔"""
        # 지정된 패턴(.md, .html)으로 파일 검색
        pass

    async def _parse_file(self, file_path: str) -> Optional[CollectedItem]:
        """파일 파싱 (HTML/MD)"""
        # 파일 읽기 및 파싱
        pass

    async def _archive_files(self, files: List[str]):
        """처리된 파일 아카이브"""
        # 파일을 Archive/Perplexity로 이동
        pass
```

### 3.2 지원 파일 형식

| 형식 | 지원 여부 | 파서 | 추출 정보 |
|------|----------|------|----------|
| Markdown (.md) | ✅ 완전 지원 | frontmatter_parser | 제목, 내용, 메타데이터 |
