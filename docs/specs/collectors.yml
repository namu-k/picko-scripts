## 4. 디스커버리 컬렉터 스펙

### 4.1 BaseDiscoveryCollector 인터페이스

```python
from abc import ABC, abstractmethod
from picko.discovery.base import SourceCandidate

class BaseDiscoveryCollector(ABC):
    """소스 발견 컬렉터 기본 클래스"""

    @abstractmethod
    async def discover(self, keywords: List[str], platform: str) -> List[SourceCandidate]:
        """새로운 소스 발견"""
        pass
```

### 4.2 RedditCollector 스펙

```python
class RedditDiscoveryCollector(BaseDiscoveryCollector):
    """Reddit 소스 발겕"""

    async def discover(self, keywords: List[str], max_results: int = 10) -> List[SourceCandidate]:
        """
        Reddit에서 관련 커뮤니티 발견

        Args:
            keywords: 검색 키워드
            max_results: 최대 결과 수

        Returns:
            SourceCandidate 리스트
        """
        # Reddit API 호출
        search_results = await self._search_subreddits(keywords, max_results)

        # SourceCandidate로 변환
        candidates = []
        for result in search_results:
            candidate = SourceCandidate(
                id=f"reddit_{result['subreddit']}",
                platform="reddit",
                handle=f"r/{result['subreddit']}",
                name=result['title'],
                description=result['description'],
                url=f"https://reddit.com/r/{result['subreddit']}",
                metadata={
                    'subscribers': result['subscribers'],
                    'active_users': result['active_users'],
                    'created_at': result['created_at']
                }
            )
            candidates.append(candidate)

        return candidates
```

### 4.3 MastodonCollector 스펙

```python
class MastodonDiscoveryCollector(BaseDiscoveryCollector):
    """Mastodon 소스 발견"""

    async def discover(self, keywords: List[str], max_results: int = 10) -> List[SourceCandidate]:
        """
        Mastodon에서 관계 사용자 발견

        Args:
            keywords: 검색 키워드
            max_results: 최대 결과 수

        Returns:
            SourceCandidate 리스트
        """
        # Mastodon API 호출
        search_results = await self._search_users(keywords, max_results)

        # SourceCandidate로 변환
        candidates = []
        for result in search_results:
            candidate = SourceCandidate(
                id=f"mastodon_{result['id']}",
                platform="mastodon",
                handle=result['username'],
                name=result['display_name'],
                description=result['note'],
                url=result['url'],
                metadata={
                    'followers_count': result['followers_count'],
                    'following_count': result['following_count'],
                    'created_at': result['created_at']
                }
            )
            candidates.append(candidate)

        return candidates
```

