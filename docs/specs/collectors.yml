## 9. 테스트 스펙

### 9.1 단위 테스트

```python
# tests/test_collectors.py
import pytest
from unittest.mock import AsyncMock, patch
from picko.collectors.rss import RSSCollector
from picko.collectors.base import CollectedItem

@pytest.mark.asyncio
async def test_rss_collector():
    # 테스트 데이터
    mock_feed = """
    <rss version="2.0">
        <channel>
            <title>Test Feed</title>
            <item>
                <title>Test Item</title>
                <link>https://example.com/test</link>
                <description>Test content</description>
                <pubDate>Mon, 01 Jan 2026 00:00:00 GMT</pubDate>
            </item>
        </channel>
    </rss>
    """

    # 컬렉터 생성
    collector = RSSCollector({'timeout': 30})

    # Mock 설정
    with patch('aiohttp.ClientSession.get') as mock_get:
        mock_get.return_value.__aenter__.return_value.text = AsyncMock(return_value=mock_feed)

        # 수집 실행
        source = SourceMeta(url='https://example.com/feed')
        items = await collector.collect(source)

        # 결과 검증
        assert len(items) == 1
        assert items[0].title == 'Test Item'
        assert items[0].url == 'https://example.com/test'
```

