# Picko 컬렉터 스펙 (Collector Specifications)

> **버전**: 1.0.0
> **최종 수정**: 2026-03-04
> **대상 독자**: 개발자, 시스템 아키텍트

---

## 개요

컬렉터 스펙은 Picko 시스템의 콘텐츠 수집 레이어에 대한 상세 명세입니다. 모든 컬렉터는 `BaseCollector` 클래스를 상속받아 일관된 인터페이스를 제공합니다.

---

## 1. 컬렉터 아키텍처

### 1.1 기본 구조

```yaml
# 컬렉터 계층 구조
BaseCollector (추상 클래스)
├── RSSCollector
├── PerplexityCollector
├── RedditCollector (미구현)
├── MastodonCollector
└── ThreadsCollector (미구현)
```

### 1.2 BaseCollector 인터페이스

```python
from abc import ABC, abstractmethod
from typing import List, Dict, Any
from picko.collectors.base import CollectedItem, SourceMeta

class BaseCollector(ABC):
    """모든 컬렉터의 기본 클래스"""

    def __init__(self, config: Dict[str, Any]):
        self.config = config
        self.source_meta: SourceMeta = None

    @abstractmethod
    async def collect(self, source: SourceMeta) -> List[CollectedItem]:
        """소스에서 콘텐츠 수집"""
        pass

    def validate_source(self, source: SourceMeta) -> bool:
        """소스 유효성 검증"""
        pass

    def post_process(self, items: List[CollectedItem]) -> List[CollectedItem]:
        """수집 후 처리 (정규화, 필터링 등)"""
        pass
```

### 1.3 CollectedItem 데이터 모델

```python
@dataclass
class CollectedItem:
    """수집된 콘텐츠의 표준 데이터 구조"""

    # 필수 필드
    id: str                    # 고유 식별자
    title: str                # 제목
    content: str              # 전체 콘텐츠
    url: str                  # 원본 URL
    source_url: str           # 소스 URL (피드 URL 등)

    # 선택 필드
    summary: Optional[str] = None    # 자동 생성 요약
    tags: List[str] = field(default_factory=list)  # 태그
    author: Optional[str] = None      # 저자
    published_at: Optional[datetime] = None  # 발행일
    collected_at: datetime = field(default_factory=datetime.now)  # 수집일

    # 메타데이터
    source_type: str = "rss"    # 소스 타입 (rss, perplexity, reddit 등)
    language: Optional[str] = None  # 언어 코드 (ko, en 등)
    image_urls: List[str] = field(default_factory=list)  # 이미지 URL
    video_urls: List[str] = field(default_factory=list)  # 비디오 URL

    # 품질 점수 (컬렉터에서 계산)
    quality_score: Optional[float] = None
    relevance_score: Optional[float] = None

    def to_dict(self) -> Dict[str, Any]:
        """Dictionary 변환"""
        return asdict(self)
```

