## 7. 성능 최적화

### 7.1 배치 처리

```python
# 컬렉터 배치 처리 예시
async def collect_batch(sources: List[SourceMeta], batch_size: int = 10):
    """여러 소스를 배치로 수집"""
    tasks = []
    for i in range(0, len(sources), batch_size):
        batch = sources[i:i + batch_size]
        task = asyncio.gather(*[
            collect_source(source) for source in batch
        ])
        tasks.append(task)

    results = []
    for task in tasks:
        batch_results = await task
        results.extend(batch_results)

    return results
```

### 7.2 캐싱 전략

```python
# 컬렉터 캐싱
import hashlib
from datetime import datetime, timedelta

class CollectorCache:
    def __init__(self, ttl_hours: int = 24):
        self.ttl = timedelta(hours=ttl_hours)
        self.cache = {}

    def get_key(self, source_url: str, modified_since: datetime = None) -> str:
        """캐시 키 생성"""
        key_data = f"{source_url}_{modified_since.isoformat() if modified_since else ''}"
        return hashlib.md5(key_data.encode()).hexdigest()

    def get(self, key: str) -> Optional[List[CollectedItem]]:
        """캐시에서 아이템 조회"""
        if key in self.cache:
            data, timestamp = self.cache[key]
            if datetime.now() - timestamp < self.ttl:
                return data
        return None

    def set(self, key: str, items: List[CollectedItem]):
        """캐시에 아이템 저장"""
        self.cache[key] = (items, datetime.now())
```

