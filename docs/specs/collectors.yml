## 5. 컬렉터 설정

### 5.1 컬렉터별 설정 예시

```yaml
# config/collectors.yml

# RSS 컬렉터 설정
rss:
  enabled: true
  timeout_seconds: 30
  max_retries: 3
  retry_delay_seconds: 5
  user_agent: "Picko-Collector/1.0"

  # 헤더 설정
  headers:
    Accept: "application/rss+xml, application/xml, text/xml"

  # 인코딩
  encoding: "utf-8"

  # 파싱 옵션
  parse_options:
    extract_images: true
    extract_videos: false
    max_content_length: 100000  # 100KB

# Perplexity 컬렉터 설정
perplexity:
  enabled: true
  input_dir: "Inbox/Perplexity"
  archive_dir: "Archive/Perplexity"
  file_patterns:
    - "*.md"
    - "*.html"
  archive_on_success: true

  # 파싱 옵션
  parse_options:
    extract_frontmatter: true
    remove_html_tags: true

# 품질 관리 규칙
quality_rules:
  min_relevance_score: 0.6
  min_quality_score: 0.5
  max_inactive_days: 30
  min_signal_noise_ratio: 0.2

  # 신뢰 소스 임계값
  trusted_threshold_quality: 0.9
  trusted_threshold_count: 50
```

