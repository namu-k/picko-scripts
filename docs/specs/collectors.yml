## 6. 컬렉터 확장 가이드

### 6.1 새 컬렉터 추가

```python
# picko/collectors/custom_collector.py
from picko.collectors.base import BaseCollector, CollectedItem
from picko.collectors.base import SourceMeta

class CustomCollector(BaseCollector):
    """새로운 컬렉터 예시"""

    def __init__(self, config: Dict[str, Any]):
        super().__init__(config)
        self.api_key = config.get('api_key')

    async def collect(self, source: SourceMeta) -> List[CollectedItem]:
        # 1. API 호출
        response = await self._call_api(source.url)

        # 2. 데이터 변환
        items = []
        for data in response['items']:
            item = CollectedItem(
                id=data['id'],
                title=data['title'],
                content=data['content'],
                url=data['url'],
                source_url=source.url,
                published_at=datetime.fromisoformat(data['published_at'])
            )
            items.append(item)

        return items

    async def _call_api(self, url: str) -> Dict:
        """API 호출 예시"""
        pass
```

### 6.2 컬렉터 등록

```python
# picko/collectors/__init__.py
from .rss import RSSCollector
from .perplexity import PerplexityCollector
from .custom_collector import CustomCollector

# 컬렉터 매핑
COLLECTORS = {
    'rss': RSSCollector,
    'perplexity': PerplexityCollector,
    'custom': CustomCollector
}

def get_collector(collector_type: str, config: Dict[str, Any]) -> BaseCollector:
    """컬렉터 인스턴스 생성"""
    if collector_type not in COLLECTORS:
        raise ValueError(f"Unknown collector type: {collector_type}")
    return COLLECTORS[collector_type](config)
```

