## 10. 보안 고려사항

### 10.1 입력 검증

```python
def validate_source_url(url: str) -> bool:
    """URL 유효성 검증"""
    try:
        parsed = urlparse(url)
        if not parsed.scheme in ['http', 'https']:
            return False
        if not parsed.netloc:
            return False
        return True
    except:
        return False

def sanitize_content(content: str) -> str:
    """XSS 방지를 위한 내용 정제"""
    # HTML 태그 제거 또는 이스케이프
    return bleach.clean(content, tags=[], strip=True)
```

