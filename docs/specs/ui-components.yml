### 5.2 WorkflowExecutor 컴포넌트

```typescript
// components/workflow/WorkflowExecutor/WorkflowExecutor.tsx
import React, { useEffect, useState } from 'react';
import { Card } from '../common/Card';
import { ProgressIndicator } from '../data/ProgressIndicator';

interface WorkflowExecutorProps {
  workflowId: string;
  workflowName: string;
  steps: Array<{
    name: string;
    status: 'pending' | 'running' | 'completed' | 'failed';
  }>;
}

export const WorkflowExecutor: React.FC<WorkflowExecutorProps> = ({
  workflowId,
  workflowName,
  steps
}) => {
  const [currentStep, setCurrentStep] = useState(0);
  const [executionLog, setExecutionLog] = useState<string[]>([]);

  useEffect(() => {
    // 워크플로우 실행 로그 업데이트
    const timer = setTimeout(() => {
      if (currentStep < steps.length) {
        setExecutionLog(prev => [
          ...prev,
          `[${new Date().toLocaleTimeString()}] ${steps[currentStep].name} 시작`
        ]);

        // 단계 완료 시뮬레이션
        setTimeout(() => {
          setExecutionLog(prev => [
            ...prev,
            `[${new Date().toLocaleTimeString()}] ${steps[currentStep].name} 완료`
          ]);

          if (currentStep < steps.length - 1) {
            setCurrentStep(prev => prev + 1);
          }
        }, 2000);
      }
    }, 1000);

    return () => clearTimeout(timer);
  }, [currentStep, steps]);

  return (
    <div className="space-y-6">
      <Card title={`워크플로우 실행: ${workflowName}`}>
        <div className="space-y-4">
          <div>
            <div className="text-sm text-gray-600 mb-2">
              실행 ID: {workflowId}
            </div>
            <ProgressIndicator steps={steps} />
          </div>

          <div className="grid grid-cols-2 gap-4">
            <div className="bg-gray-50 rounded-lg p-4">
              <div className="text-sm text-gray-600">총 단계</div>
              <div className="text-2xl font-bold">{steps.length}</div>
            </div>
            <div className="bg-gray-50 rounded-lg p-4">
              <div className="text-sm text-gray-600">진행률</div>
              <div className="text-2xl font-bold">
                {Math.round((currentStep / steps.length) * 100)}%
              </div>
            </div>
          </div>
        </div>
      </Card>

      <Card title="실행 로그">
        <div className="bg-gray-900 text-green-400 p-4 rounded-lg font-mono text-sm h-64 overflow-y-auto">
          {executionLog.length > 0 ? (
            executionLog.map((log, index) => (
              <div key={index}>{log}</div>
            ))
          ) : (
            <div>로그가 표시됩니다...</div>
          )}
        </div>
      </Card>
    </div>
  );
};
```

