## 9. API 통합

### 9.1 API 클라이언트

```typescript
// utils/api.ts
import axios from 'axios';

const api = axios.create({
  baseURL: process.env.NEXT_PUBLIC_API_URL || 'http://localhost:8000',
  timeout: 10000,
  headers: {
    'Content-Type': 'application/json',
  }
});

// 인터셉터 설정
api.interceptors.request.use(
  (config) => {
    const token = localStorage.getItem('token');
    if (token) {
      config.headers.Authorization = `Bearer ${token}`;
    }
    return config;
  },
  (error) => {
    return Promise.reject(error);
  }
);

api.interceptors.response.use(
  (response) => response.data,
  (error) => {
    if (error.response?.status === 401) {
      // 인증 실패 시 로그아웃
      localStorage.removeItem('token');
      window.location.href = '/login';
    }
    return Promise.reject(error);
  }
);

export default api;
```

### 9.2 RTK Query API

```typescript
// api/workflowsApi.ts
import { createApi, fetchBaseQuery } from '@reduxjs/toolkit/query/react';

export const workflowsApi = createApi({
  reducerPath: 'workflowsApi',
  baseQuery: fetchBaseQuery({
    baseUrl: '/api/v1',
    prepareHeaders: (headers, { getState }) => {
      const token = (getState() as RootState).auth.token;
      if (token) {
        headers.set('authorization', `Bearer ${token}`);
      }
      return headers;
    },
  }),
  tagTypes: ['Workflow'],
  endpoints: (builder) => ({
    getWorkflows: builder.query<Workflow[], void>({
      query: () => '/workflows',
      providesTags: ['Workflow']
    }),
    getWorkflow: builder.query<Workflow, string>({
      query: (id) => `/workflows/${id}`,
      providesTags: (result, error, id) => [{ type: 'Workflow', id }]
    }),
    createWorkflow: builder.mutation<Workflow, Partial<Workflow>>({
      query: (workflow) => ({
        url: '/workflows',
        method: 'POST',
        body: workflow
      }),
      invalidatesTags: ['Workflow']
    }),
    executeWorkflow: builder.mutation<ExecutionResult, string>({
      query: (id) => ({
        url: `/workflows/${id}/execute`,
        method: 'POST'
      }),
      onQueryStarted: async (id, { queryFulfilled }) => {
        // 워크플로우 실행 시작 시 캐시 무효화
        await queryFulfilled;
        dispatch(workflowsApi.util.invalidateTags(['Workflow']));
      }
    })
  })
});

export const {
  useGetWorkflowsQuery,
  useGetWorkflowQuery,
  useCreateWorkflowMutation,
  useExecuteWorkflowMutation
} = workflowsApi;
```

