```typescript
// components/data/ItemCard/ItemCard.tsx
import React from 'react';
import { CheckCircleIcon, XCircleIcon, ClockIcon } from '@heroicons/react/24/outline';

interface ItemCardProps {
  id: string;
  title: string;
  summary: string;
  tags: string[];
  status: 'pending' | 'approved' | 'rejected' | 'processing';
  score?: number;
  createdAt: string;
  onClick?: () => void;
}

export const ItemCard: React.FC<ItemCardProps> = ({
  id,
  title,
  summary,
  tags,
  status,
  score,
  createdAt,
  onClick
}) => {
  const statusConfig = {
    pending: {
      icon: <ClockIcon className="w-5 h-5 text-yellow-500" />,
      label: '대기 중',
      color: 'border-yellow-200 bg-yellow-50'
    },
    approved: {
      icon: <CheckCircleIcon className="w-5 h-5 text-green-500" />,
      label: '승인됨',
      color: 'border-green-200 bg-green-50'
    },
    rejected: {
      icon: <XCircleIcon className="w-5 h-5 text-red-500" />,
      label: '거부됨',
      color: 'border-red-200 bg-red-50'
    },
    processing: {
      icon: <ClockIcon className="w-5 h-5 text-blue-500 animate-spin" />,
      label: '처리 중',
      color: 'border-blue-200 bg-blue-50'
    }
  };

  const config = statusConfig[status];

  return (
    <div
      className={`rounded-lg border ${config.color} cursor-pointer transition-all duration-200 hover:shadow-md`}
      onClick={onClick}
    >
      <div className="p-4">
        <div className="flex items-start justify-between mb-2">
          <h3 className="font-medium text-gray-900 flex-1">{title}</h3>
          {config.icon}
        </div>

        <p className="text-sm text-gray-600 mb-3 line-clamp-2">
          {summary}
        </p>

        <div className="flex items-center justify-between">
          <div className="flex flex-wrap gap-1">
            {tags.map((tag, index) => (
              <span
                key={index}
                className="px-2 py-1 text-xs bg-gray-100 text-gray-700 rounded"
              >
                {tag}
              </span>
            ))}
          </div>

          {score && (
            <span className="text-xs font-medium text-gray-700">
              점수: {score.toFixed(2)}
            </span>
          )}
        </div>
      </div>

      <div className="px-4 py-2 border-t border-gray-200 bg-white/50">
        <div className="flex items-center justify-between text-xs text-gray-500">
          <span>ID: {id}</span>
          <span>{new Date(createdAt).toLocaleDateString('ko-KR')}</span>
        </div>
      </div>
    </div>
  );
};
```

### 4.3 ProgressIndicator 컴포넌트

```typescript
// components/data/ProgressIndicator/ProgressIndicator.tsx
import React from 'react';

interface ProgressIndicatorProps {
  steps: Array<{
    name: string;
    status: 'completed' | 'current' | 'pending';
  }>;
}

export const ProgressIndicator: React.FC<ProgressIndicatorProps> = ({ steps }) => {
  return (
    <div className="flex items-center">
      {steps.map((step, index) => {
        const isLast = index === steps.length - 1;
        const isCompleted = step.status === 'completed';
        const isCurrent = step.status === 'current';

        return (
          <React.Fragment key={index}>
            <div className="flex items-center">
              <div className={`
                flex items-center justify-center w-8 h-8 rounded-full border-2
                ${isCompleted
                  ? 'bg-blue-600 border-blue-600 text-white'
                  : isCurrent
                    ? 'bg-blue-100 border-blue-600 text-blue-600'
                    : 'bg-white border-gray-300 text-gray-400'
                }
              `}>
                {isCompleted ? (
                  <CheckCircleIcon className="w-5 h-5" />
                ) : (
                  <span className="text-sm font-medium">{index + 1}</span>
                )}
              </div>
              <span className={`
                ml-2 text-sm font-medium
                ${isCompleted || isCurrent ? 'text-gray-900' : 'text-gray-500'}
              `}>
                {step.name}
              </span>
            </div>

            {!isLast && (
              <div className={`
                flex-1 h-0.5 mx-4
                ${isCompleted ? 'bg-blue-600' : 'bg-gray-200'}
              `} />
            )}
          </React.Fragment>
        );
      })}
    </div>
  );
};
```

