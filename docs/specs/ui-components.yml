## 2. 공통 컴포넌트

### 2.1 Button 컴포넌트

```typescript
// components/common/Button/Button.tsx
import React from 'react';
import { Button as HeadlessButton } from '@headlessui/react';

interface ButtonProps {
  variant?: 'primary' | 'secondary' | 'outline' | 'ghost' | 'destructive';
  size?: 'sm' | 'md' | 'lg';
  loading?: boolean;
  disabled?: boolean;
  children: React.ReactNode;
  onClick?: () => void;
  className?: string;
  icon?: React.ReactNode;
}

export const Button: React.FC<ButtonProps> = ({
  variant = 'primary',
  size = 'md',
  loading = false,
  disabled = false,
  children,
  onClick,
  className = '',
  icon
}) => {
  return (
    <HeadlessButton
      onClick={onClick}
      disabled={disabled || loading}
      className={`
        inline-flex items-center justify-center rounded-lg font-medium
        transition-colors duration-200
        ${variantStyles[variant]}
        ${sizeStyles[size]}
        ${disabled ? 'opacity-50 cursor-not-allowed' : 'hover:opacity-90'}
        ${loading ? 'cursor-wait' : ''}
        ${className}
      `}
    >
      {loading && (
        <svg className="animate-spin -ml-1 mr-2 h-4 w-4" ... />
      )}
      {icon && <span className="mr-2">{icon}</span>}
      {children}
    </HeadlessButton>
  );
};

// 스타일 정의
const variantStyles = {
  primary: 'bg-blue-600 text-white',
  secondary: 'bg-gray-200 text-gray-900',
  outline: 'border border-gray-300 text-gray-700 bg-transparent',
  ghost: 'text-gray-700 bg-transparent hover:bg-gray-100',
  destructive: 'bg-red-600 text-white hover:bg-red-700'
};

const sizeStyles = {
  sm: 'px-3 py-1.5 text-sm',
  md: 'px-4 py-2 text-base',
  lg: 'px-6 py-3 text-lg'
};
```

### 2.2 Input 컴포넌트

```typescript
// components/common/Input/Input.tsx
import React from 'react';
import { useForm, UseFormRegister } from 'react-hook-form';
import { ZodSchema } from 'zod';

interface InputProps {
  id: string;
  label: string;
  type?: 'text' | 'email' | 'password' | 'number' | 'url';
  placeholder?: string;
  required?: boolean;
  error?: string;
  register: UseFormRegister<any>;
  schema?: ZodSchema;
}

export const Input: React.FC<InputProps> = ({
  id,
  label,
  type = 'text',
  placeholder,
  required = false,
  error,
  register,
  schema
}) => {
  return (
    <div className="space-y-1">
      <label htmlFor={id} className="block text-sm font-medium text-gray-700">
        {label}
        {required && <span className="text-red-500 ml-1">*</span>}
      </label>
      <input
        id={id}
        type={type}
        placeholder={placeholder}
        className={`
          w-full px-3 py-2 border rounded-lg
          transition-colors duration-200
          ${error
            ? 'border-red-500 focus:ring-red-500 focus:border-red-500'
            : 'border-gray-300 focus:ring-blue-500 focus:border-blue-500'
          }
        `}
        {...register(id, {
          required: required ? `${label} is required` : false,
          pattern: type === 'email' ? /^[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}$/i : undefined,
          ...(schema && { validate: (value) => schema.safeParse(value).success })
        })}
      />
      {error && (
        <p className="text-sm text-red-600 mt-1">{error}</p>
      )}
    </div>
  );
};
```

