## 8. 상태 관리

### 8.1 Redux Store 구조

```typescript
// store/index.ts
import { configureStore } from '@reduxjs/toolkit';
import { workflowsSlice } from './workflowsSlice';
import { settingsSlice } from './settingsSlice';

export const store = configureStore({
  reducer: {
    workflows: workflowsSlice.reducer,
    settings: settingsSlice.reducer,
  },
  middleware: (getDefaultMiddleware) =>
    getDefaultMiddleware({
      serializableCheck: {
        ignoredActions: ['persist/PERSIST', 'persist/REHYDRATE']
      }
    })
});

export type RootState = ReturnType<typeof store.getState>;
export type AppDispatch = typeof store.dispatch;
```

### 8.2 Workflow Slice

```typescript
// store/workflowsSlice.ts
import { createSlice, PayloadAction } from '@reduxjs/toolkit';
import { Workflow } from '@/types/workflow';

interface WorkflowsState {
  workflows: Workflow[];
  currentWorkflow: Workflow | null;
  loading: boolean;
  error: string | null;
}

const initialState: WorkflowsState = {
  workflows: [],
  currentWorkflow: null,
  loading: false,
  error: null
};

const workflowsSlice = createSlice({
  name: 'workflows',
  initialState,
  reducers: {
    fetchWorkflowsStart: (state) => {
      state.loading = true;
      state.error = null;
    },
    fetchWorkflowsSuccess: (state, action: PayloadAction<Workflow[]>) => {
      state.workflows = action.payload;
      state.loading = false;
    },
    fetchWorkflowsError: (state, action: PayloadAction<string>) => {
      state.loading = false;
      state.error = action.payload;
    },
    setCurrentWorkflow: (state, action: PayloadAction<Workflow>) => {
      state.currentWorkflow = action.payload;
    }
  }
});

export const {
  fetchWorkflowsStart,
  fetchWorkflowsSuccess,
  fetchWorkflowsError,
  setCurrentWorkflow
} = workflowsSlice.actions;

export default workflowsSlice.reducer;
```

