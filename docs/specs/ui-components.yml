## 5. 워크플로우 컴포넌트

### 5.1 WorkflowBuilder 컴포넌트

```typescript
// components/workflow/WorkflowBuilder/WorkflowBuilder.tsx
import React, { useState } from 'react';
import { Card } from '../common/Card';
import { Button } from '../common/Button';

interface WorkflowBuilderProps {
  workflow?: {
    name: string;
    description: string;
    steps: Array<{
      name: string;
      action: string;
      args: Record<string, any>;
    }>;
  };
  onSave?: (workflow: any) => void;
}

export const WorkflowBuilder: React.FC<WorkflowBuilderProps> = ({
  workflow,
  onSave
}) => {
  const [steps, setSteps] = useState(workflow?.steps || []);
  const [selectedStep, setSelectedStep] = useState<number | null>(null);

  const addStep = () => {
    const newStep = {
      name: `Step ${steps.length + 1}`,
      action: 'action.name',
      args: {}
    };
    setSteps([...steps, newStep]);
  };

  const removeStep = (index: number) => {
    setSteps(steps.filter((_, i) => i !== index));
  };

  const updateStep = (index: number, updates: any) => {
    const newSteps = [...steps];
    newSteps[index] = { ...newSteps[index], ...updates };
    setSteps(newSteps);
  };

  const handleSave = () => {
    if (onSave) {
      onSave({
        name: 'Custom Workflow',
        description: '사용자 정의 워크플로우',
        steps
      });
    }
  };

  return (
    <div className="space-y-4">
      <Card title="워크플로우 설정">
        <div className="space-y-4">
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">
              워크플로우 이름
            </label>
            <input
              type="text"
              className="w-full px-3 py-2 border rounded-lg"
              defaultValue={workflow?.name || ''}
              onChange={(e) => setSteps([{ ...steps[0], name: e.target.value }])}
            />
          </div>

          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">
              설명
            </label>
            <textarea
              className="w-full px-3 py-2 border rounded-lg"
              rows={3}
              defaultValue={workflow?.description || ''}
            />
          </div>
        </div>
      </Card>

      <Card title="단계 설정">
        <div className="space-y-4">
          {steps.map((step, index) => (
            <div key={index} className="border rounded-lg p-4">
              <div className="flex items-center justify-between mb-3">
                <h4 className="font-medium">Step {index + 1}</h4>
                <Button
                  variant="ghost"
                  size="sm"
                  onClick={() => removeStep(index)}
                >
                  삭제
                </Button>
              </div>

              <div className="space-y-3">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">
                    단계 이름
                  </label>
                  <input
                    type="text"
                    className="w-full px-3 py-2 border rounded-lg"
                    value={step.name}
                    onChange={(e) => updateStep(index, { name: e.target.value })}
                  />
                </div>

                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">
                    액션
                  </label>
                  <select
                    className="w-full px-3 py-2 border rounded-lg"
                    value={step.action}
                    onChange={(e) => updateStep(index, { action: e.target.value })}
                  >
                    <option value="collector.run">collector.run</option>
                    <option value="generator.run">generator.run</option>
                    <option value="quality.verify">quality.verify</option>
                  </select>
                </div>
              </div>
            </div>
          ))}

          <Button onClick={addStep} variant="outline">
            단계 추가
          </Button>
        </div>
      </Card>

      <div className="flex justify-end space-x-2">
        <Button variant="outline">미리보기</Button>
        <Button onClick={handleSave}>저장</Button>
      </div>
    </div>
  );
};
