### 11.2 키보드 네비게이션

```typescript
// 키보드 네비게이션 구현
import React, { useRef, useEffect } from 'react';

export const FocusTrap: React.FC<{ children: React.ReactNode }> = ({ children }) => {
  const focusableElements = useRef<(HTMLElement | null)[]>([]);
  const firstElement = useRef<HTMLElement | null>(null);
  const lastElement = useRef<HTMLElement | null>(null);

  useEffect(() => {
    focusableElements.current = Array.from(
      document.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])')
    );

    firstElement.current = focusableElements.current[0];
    lastElement.current = focusableElements.current[focusableElements.current.length - 1];

    const handleKeyDown = (e: KeyboardEvent) => {
      if (e.key === 'Tab') {
        if (e.shiftKey) {
          if (document.activeElement === firstElement.current) {
            e.preventDefault();
            lastElement.current?.focus();
          }
        } else {
          if (document.activeElement === lastElement.current) {
            e.preventDefault();
            firstElement.current?.focus();
          }
        }
      }
    };

    document.addEventListener('keydown', handleKeyDown);
    return () => document.removeEventListener('keydown', handleKeyDown);
  }, []);

  return <>{children}</>;
};
```

