# Picko UI 컴포넌트 스펙 (UI Component Specifications)

> **버전**: 1.0.0
> **최종 수정**: 2026-03-04
> **대상 독자**: 프론트엔드 개발자, UI/UX 디자이너

---

## 개요

UI 컴포넌트 스펙은 Picko 시스템의 웹 인터페이스에 사용되는 UI 컴포넌트에 대한 상세 명세입니다. React 기반의 단일 페이지 애플리케이션(SPA)으로 구성되며, 다양한 UI 컴포넌트와 레이아웃 시스템을 제공합니다.

---

## 1. UI 아키텍처

### 1.1 기본 구조

```javascript
// UI 아키텍처 구조
UI Framework: React 18+ + TypeScript
├── State Management: Redux Toolkit + RTK Query
├── Routing: React Router v6
├── Styling: Tailwind CSS + Styled Components
├── Components: Headless UI + 커스텀 컴포넌트
├── Forms: React Hook Form + Zod 유효성 검사
├── Charts: Recharts
└── Notifications: React Hot Toast
```

### 1.2 폴더 구조

```
src/
├── components/                 # 재사용 가능 컴포넌트
