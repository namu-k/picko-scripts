## 10. 테스트 스펙

### 10.1 워크플로우 테스트

```python
# tests/test_workflows.py
import pytest
from unittest.mock import AsyncMock, patch
from picko.orchestrator.engine import WorkflowEngine
from picko.orchestrator.actions import ActionRegistry

@pytest.mark.asyncio
async def test_workflow_execution():
    """워크플로우 실행 테스트"""

    # 워크플로우 정의
    workflow = {
        "name": "test_pipeline",
        "steps": [
            {
                "name": "test_step",
                "action": "test.mock_action",
                "args": {"test_arg": "test_value"}
            }
        ]
    }

    # Mock 액션 설정
    with patch('test.mock_action') as mock_action:
        mock_action.return_value = AsyncMock(return_value={
            "success": True,
            "outputs": {"result": "success"}
        })

        # 실행
        engine = WorkflowEngine(registry)
        result = await engine.run(workflow)

        # 검증
        assert result.status == "completed"
        assert result.steps[0].outputs["result"] == "success"
```

### 10.2 표현식 테스트

```python
# tests/test_expressions.py
@pytest.mark.asyncio
async def test_expression_evaluation():
    """표현식 평가 테스트"""

    evaluator = ExpressionEvaluator(mock_vault, mock_context)

    # Vault 표현식
    result = evaluator.evaluate("vault.count('Inbox/Inputs', 'status=pending')")
    assert result == 5

    # 단계 출력 참조
    result = evaluator.evaluate("steps.collect.outputs.items.length")
    assert result == 10

    # 복합 조건
    result = evaluator.evaluate("steps.collect.outputs.success && steps.dedup.outputs.items.length > 0")
    assert result == True
