## 8. 워크플로우 확장

### 8.1 커스텀 액션 추가

```python
# picko/orchestrator/custom_actions.py
from picko.orchestrator.actions import ActionRegistry, ActionResult

def register_custom_actions(registry: ActionRegistry):
    """커스텀 액션 등록"""

    @registry.register("custom.action")
    async def custom_action_handler(args: dict) -> ActionResult:
        """커스텀 액션 핸들러"""
        try:
            # 액션 로직 구현
            result = await perform_custom_action(args)

            return ActionResult(
                success=True,
                outputs=result
            )
        except Exception as e:
            return ActionResult(
                success=False,
                error=str(e)
            )

async def perform_custom_action(args: dict):
    """실제 커스텀 액션"""
    # 구현
    pass
```

