# Picko 워크플로우 스펙 (Workflow Specifications)

> **버전**: 1.0.0
> **최종 수정**: 2026-03-04
> **대상 독자**: 개발자, 시스템 아키텍트, DevOps

---

## 개요

워크플로우 스펙은 Picko 시스템의 워크플로우 실행 엔진에 대한 상세 명세입니다. YAML 기반의 선언적 워크플로우를 정의하고 실행할 수 있는 강력한 오케스트레이션 시스템입니다.

---

## 1. 워크플로우 아키텍처

### 1.1 핵심 구성 요소

```yaml
워크플로우 시스템 구조
├── WorkflowEngine         # 워크플로우 실행 엔진
├── ActionRegistry        # 액션 레지스트리
├── Step                  # 단계
├── ExpressionEvaluator   # 표현식 평가기
└── BatchProcessor        # 배치 처리기
```

### 1.2 WorkflowEngine 클래스

```python
class WorkflowEngine:
    """워크플로우 실행 엔진"""

    def __init__(self, registry: ActionRegistry):
        self.registry = registry
        self.execution_context = ExecutionContext()
        self.state_machine = WorkflowStateMachine()

    async def run(
        self,
        workflow_path: str,
        args: Dict[str, Any] = None,
        dry_run: bool = False,
        timeout_seconds: int = 3600
    ) -> WorkflowResult:
        """
        워크플로우 실행

        Args:
            workflow_path: 워크플로우 YAML 파일 경로
            args: 실행 인자
            dry_run: 실제 실행 없이 테스트 모드
            timeout_seconds: 타임아웃 (초)

        Returns:
            WorkflowResult 실행 결과
        """
        # 1. 워크플로우 로드
        workflow = self._load_workflow(workflow_path)

        # 2. 실행 컨텍스트 초기화
        self.execution_context.initialize(workflow, args or {})

        # 3. 단계 실행
        for step in workflow.steps:
            await self._execute_step(step)

        # 4. 결과 반환
        return self.execution_context.get_result()
```

### 1.3 ActionRegistry

```python
class ActionRegistry:
    """액션 레지스트리"""

    def __init__(self):
        self.actions = {}

    def register(self, name: str, handler: Callable):
        """액션 등록"""
        self.actions[name] = handler

    def get_action(self, name: str) -> Callable:
        """액션 조회"""
        if name not in self.actions:
            raise ValueError(f"Unknown action: {name}")
        return self.actions[name]

# 기본 액션 등록
register_default_actions(registry)
```

