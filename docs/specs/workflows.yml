## 6. 내장 워크플로우

### 6.1 `daily_pipeline.yml`

```yaml
name: daily_pipeline
description: 일일 콘텐츠 수집 → 중복 제거 → auto_ready 항목 longform 생성

steps:
  # 1. 수집
  - name: collect
    action: collector.run
    args:
      account: socialbuilders

  # 2. 중복 제거
  - name: dedup
    action: embedding.check_duplicate
    args:
      source: "${{ steps.collect.outputs.items }}"
      threshold: 0.9

  # 3. auto_ready 항목 longform 생성
  - name: generate_longform
    action: generator.run
    args:
      account: socialbuilders
      type: longform
    condition: "${{ vault.count('Inbox/Inputs', 'writing_status=auto_ready') > 0 }}"
    batch:
      source: "${{ vault.list('Inbox/Inputs', 'writing_status=auto_ready') }}"
      size: 5
      delay: 10s
```

### 6.2 `agentic_pipeline.yml`

```yaml
name: agentic_pipeline
description: Source discovery to quality verification and publish

steps:
  - name: collect_candidates
    action: collector.run
    args:
      account: socialbuilders

  - name: dedup_candidates
    action: embedding.check_duplicate
    args:
      source: "${{ steps.collect_candidates.outputs.items }}"
      threshold: 0.9

  - name: verify_quality
    action: quality.verify
    args:
      account: socialbuilders
      items: "${{ steps.collect_candidates.outputs.items }}"
      threshold: 0.85
    dynamic_steps:
      - name: generate_longform
        action: generator.run
        args:
          account: socialbuilders
          type: longform
          items: "${{ steps.verify_quality.outputs.verified }}"
        condition: "${{ steps.verify_quality.outputs.verified }}"

      - name: publish_twitter
        action: publisher.run
        args:
          account: socialbuilders
          source_path: Content/Packs/twitter
          filter: derivative_status=approved
          publish_platform: twitter
        condition: "${{ steps.verify_quality.outputs.verified }}"
```

### 6.3 `approved_packs.yml`

```yaml
name: approved_packs
description: 승인된 롱폼 → 소셜 팩 생성 (배치 처리)

steps:
  # 1. 승인된 롱폼 목록 조회
  - name: list_approved
    action: vault.list
    args:
      path: "Content/Longform"
      filter: "status=approved"
    outputs:
      approved_contents: "${{ outputs.items }}"

  # 2. 소셜 팩 생성
  - name: generate_packs
    action: generator.packs
    args:
      account: socialbuilders
      contents: "${{ steps.list_approved.outputs.approved_contents }}"
      types: ["twitter", "linkedin", "newsletter"]
    batch:
      source: "${{ steps.list_approved.outputs.approved_contents }}"
      size: 3
      delay: 5s

  # 3. 게시 준비
  - name: prepare_publish
    action: publisher.prepare
    args:
      source_path: "Content/Packs"
      filter: "derivative_status=approved"
```

### 6.4 `twitter_publish.yml`

```yaml
name: twitter_publish
description: 트위터 팩 게시

steps:
  # 1. 게시 대상 조회
  - name: get_publishable
    action: vault.list
    args:
      path: "Content/Packs/twitter"
      filter: "derivative_status=approved"
    outputs:
      publishable_posts: "${{ outputs.items }}"

  # 2. 게시 실행
  - name: publish_to_twitter
    action: publisher.run
    args:
      platform: twitter
      posts: "${{ steps.get_publishable.outputs.publishable_posts }}"
      dry_run: false

  # 3. 게시 상태 업데이트
  - name: update_status
    action: vault.update
    args:
      items: "${{ steps.get_publishable.outputs.publishable_posts }}"
      updates:
        derivative_status: "published"
        published_at: "${{ steps.publish_to_twitter.outputs.published_at }}"
```

