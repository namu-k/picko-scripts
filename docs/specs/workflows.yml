## 4. 기본 액션

### 4.1 수집 관리 액션

#### `collector.run`
```yaml
- name: collect
  action: collector.run
  args:
    account: socialbuilders        # 계정 ID
    sources:                      # 소스 목록 (선택)
      - url: "https://techcrunch.com/feed/"
        type: "rss"
      - url: "https://ai-news.com/rss/"
        type: "rss"
    dry_run: false               # 드라이런 모드
    max_items: 50                # 최대 아이템 수
```

#### `embedding.check_duplicate`
```yaml
- name: dedup
  action: embedding.check_duplicate
  args:
    source: "${{ steps.collect.outputs.items }}"  # 대상 아이템
    threshold: 0.9              # 유사도 임계값
    cache_enabled: true        # 캐시 활성화
```

### 4.2 콘텐츠 생성 액션

#### `generator.run`
```yaml
- name: generate_longform
  action: generator.run
  args:
    account: socialbuilders
    type: longform              # longform, packs, image
    items: "${{ steps.verify.outputs.approved }}"
    options:
      use_exploration: true
      apply_reference_style: true
      target_length: "2000"
```

#### `generator.packs`
```yaml
- name: generate_packs
  action: generator.packs
  args:
    account: socialbuilders
    content_id: "content_123"
    types: ["twitter", "linkedin"]
    options:
      twitter:
        max_length: 280
        hashtag_count: 3
```

### 4.3 품질 검증 액션

#### `quality.verify`
```yaml
- name: verify
  action: quality.verify
  args:
    account: socialbuilders
    items: "${{ steps.dedup.outputs.items }}"
    threshold: 0.85
    enhanced_mode: false
    track_feedback: true
```

#### `quality.graph`
```yaml
- name: verify_graph
  action: quality.graph
  args:
    account: socialbuilders
    item_id: "item_123"
    enhanced_verification: false
  outputs:
    verdict: "${{ result.verdict }}"
    confidence: "${{ result.confidence }}"
```

### 4.4 게시 액션

#### `publisher.run`
```yaml
- name: publish_twitter
  action: publisher.run
  args:
    account: socialbuilders
    source_path: Content/Packs/twitter
    filter: derivative_status=approved
    platform: twitter
    dry_run: false
```

### 4.5 관리 액션

#### `archive_manager.archive`
```yaml
- name: archive_old
  action: archive_manager.archive
  args:
    path: "Inbox/Inputs"
    days: 30                  # 30일 이전 아이템
    dry_run: false
```

#### `health_check`
```yaml
- name: check_health
  action: health_check.run
  args:
    check_all: true
    verbose: false
```

