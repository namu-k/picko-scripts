## 11. 보안 및 접근 제어

### 11.1 워크플로우 접근 제어

```python
class WorkflowAccessControl:
    """워크플로우 접근 제어"""

    def __init__(self):
        self.allowed_workflows = {
            "socialbuilders": ["daily_pipeline", "agentic_pipeline"],
            "tech_news": ["daily_pipeline"]
        }

    def can_execute(self, user: str, workflow: str) -> bool:
        """사용자의 워크플로우 실행 권한 확인"""
        if user in self.allowed_workflows:
            return workflow in self.allowed_workflows[user]
        return False
```

### 11.2 인자 검증

```python
def validate_workflow_args(workflow: dict, args: dict) -> bool:
    """워크플로우 인자 검증"""
    required_args = workflow.get('required_args', [])

    for arg in required_args:
        if arg not in args:
            raise ValueError(f"Missing required argument: {arg}")

    return True
```

