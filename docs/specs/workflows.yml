## 7. 워크플로우 실행

### 7.1 실행 방법

```bash
# 기본 실행
python -m scripts.run_workflow --workflow config/workflows/daily_pipeline.yml

# 계정 지정
python -m scripts.run_workflow --workflow config/workflows/daily_pipeline.yml --account socialbuilders

# 드라이런 모드
python -m scripts.run_workflow --workflow config/workflows/daily_pipeline.yml --dry-run

# 특정 단계만 실행
python -m scripts.run_workflow --workflow config/workflows/daily_pipeline.yml --steps collect,dedup

# 타임아웃 설정
python -m scripts.run_workflow --workflow config/workflows/daily_pipeline.yml --timeout 7200

# JSON 출력
python -m scripts.run_workflow --workflow config/workflows/daily_pipeline.yml --json
```

### 7.2 실행 상태

```python
from picko.orchestrator.engine import WorkflowEngine
from picko.orchestrator.actions import ActionRegistry

# 엔진 초기화
registry = ActionRegistry()
engine = WorkflowEngine(registry)

# 실행
result = engine.run(
    "config/workflows/daily_pipeline.yml",
    args={"account": "socialbuilders"},
    dry_run=True
)

# 결과 확인
print(f"Status: {result.status}")
print(f"Duration: {result.duration_seconds}s")
print(f"Steps executed: {len(result.executed_steps)}")
```

