## 3. 표현식 시스템

### 3.1 표현식 구문

```yaml
# 기본 표현식
condition: "{{ vault.count('Inbox/Inputs', 'status=pending') > 0 }}"

# 변수 참조
condition: "{{ steps.collect_items.outputs.items.length > 10 }}"

# 이전 단계 출력 참조
args:
  items: "${{ steps.dedup.outputs.items }}"

# 복합 조건
condition: "{{
  steps.collect.outputs.success &&
  steps.dedup.outputs.items.length > 0
}}"

# 헬퍼 함수 사용
condition: "{{ contains_topic(steps.verify.outputs.items, 'AI') }}"
```

### 3.2 지원 표현식

| 표현식 | 설명 | 예시 |
|--------|------|------|
| `vault.count(path, filter)` | Vault 노트 개수 | `${{ vault.count('Inbox/Inputs', 'writing_status=auto_ready') }}` |
| `vault.list(path, filter)` | Vault 노트 목록 | `${{ vault.list('Content/Longform', 'status=published') }}` |
| `vault.field(path, field)` | 프론트매터 필드 | `${{ vault.field('Content/article.md', 'score') }}` |
| `steps.<name>.outputs.<key>` | 이전 단계 출력 | `${{ steps.collect.outputs.items }}` |
| `variables.<key>` | 전역 변수 | `${{ variables.account }}` |
| `contains_topic(items, topic)` | 토픽 포함 여부 | `${{ contains_topic(steps.outputs.items, 'AI') }}` |
| `score_range(items, min, max)` | 점수 범위 필터링 | `${{ score_range(steps.outputs.items, 0.8, 1.0) }}` |
| `has_quality_flag(items, flag)` | 품질 플래그 확인 | `${{ has_quality_flag(steps.outputs.items, 'high_quality') }}` |

### 3.3 표현식 평가기

```python
class ExpressionEvaluator:
    """표현식 평가기"""

    def __init__(self, vault: VaultIO, execution_context: ExecutionContext):
        self.vault = vault
        self.context = execution_context

    def evaluate(self, expression: str) -> Any:
        """
        표현식 평가

        Args:
            expression: 평가할 표현식

        Returns:
            평가 결과
        """
        # 전처리
        expr = expression.replace('${{', '').replace('}}', '').strip()

        # 평가
        try:
            # 1. Vault 표현식 처리
            if expr.startswith('vault.'):
                return self._evaluate_vault_expression(expr)

            # 2. 단계 출력 처리
            elif expr.startswith('steps.'):
                return self._evaluate_step_expression(expr)

            # 3. 변수 처리
            elif expr.startswith('variables.'):
                return self._evaluate_variable_expression(expr)

            # 4. 헬퍼 함수 처리
            elif '(' in expr:
                return self._evaluate_helper_function(expr)

            # 5. 리터럴
            else:
                return eval(expr)

        except Exception as e:
            raise ValueError(f"Expression evaluation failed: {expr} - {str(e)}")
```

