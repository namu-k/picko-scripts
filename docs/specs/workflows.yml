## 2. 워크플로우 YAML 구조

### 2.1 기본 구조

```yaml
name: workflow_name                    # 워크플로우 이름 (필수)
description: 워크플로우 설명          # 설명 (선택)
version: "1.0.0"                     # 버전 (선택)

# 실행 설정
execution:
  timeout_seconds: 3600              # 타임아웃 (초)
  max_retries: 3                      # 최대 재시도 횟수
  retry_delay_seconds: 10            # 재시도 지연 (초)
  parallel_steps: 5                  # 병렬 실행 최대 단계 수

# 단계 정의
steps:
  - name: step_name                   # 단계 이름 (필수)
    action: action.name              # 실행 액션 (필수)
    args:                            # 인자 (선택)
      key1: value1
      key2: value2
    condition: "${{ expression }}"   # 조건부 실행 (선택)
    batch:                          # 배치 처리 (선택)
      source: "${{ vault.list(...) }}"
      size: 10
      delay: "10s"
    dynamic_steps:                  # 동적 단계 (선택)
      - name: dynamic_step
        action: action.name
        args: {...}
    fallback:                      # 폴백 액션 (선택)
      action: fallback.action
      args: {...}
```

### 2.2 고급 구조

```yaml
name: advanced_pipeline
description: 고급 워크플로우 예시

# 전역 변수
variables:
  account: socialbuilders
  threshold: 0.85
  batch_size: 5

# 단계 정의
steps:
  # 1. 컬렉션 (배치 처리)
  - name: collect_items
    action: collector.run
    args:
      account: "${{ variables.account }}"
    batch:
      source: "${{ vault.list('Inbox/Inputs', 'status=pending') }}"
      size: "${{ variables.batch_size }}"
      delay: "10s"
    timeout_seconds: 300

  # 2. 중복 제거
  - name: deduplicate
    action: embedding.check_duplicate
    args:
      source: "${{ steps.collect_items.outputs.items }}"
      threshold: 0.9
    condition: "${{ steps.collect_items.outputs.success }}"

  # 3. 품질 검증 (동적 단계)
  - name: verify_quality
    action: quality.verify
    args:
      account: "${{ variables.account }}"
      items: "${{ steps.dedup.outputs.items }}"
      threshold: "${{ variables.threshold }}"
    dynamic_steps:
      # 승인된 항목만 처리
      - name: generate_approved
        action: generator.run
        args:
          account: "${{ variables.account }}"
          type: longform
          items: "${{ steps.verify_quality.outputs.approved }}"
        condition: "${{ steps.verify_quality.outputs.verified }}"

      - name: publish_approved
        action: publisher.run
        args:
          account: "${{ variables.account }}"
          source_path: Content/Packs
          filter: derivative_status=approved
        condition: "${{ steps.verify_quality.outputs.verified }}"

  # 4. 스킵된 항목 아카이브
  - name: archive_skipped
    action: archive_manager.archive
    args:
      items: "${{ steps.verify_quality.outputs.rejected }}"
      reason: "quality_verification_failed"
    fallback:
      action: notification.send
      args:
        message: "아카이브 실패: ${{ steps.archive_skipped.outputs.error }}"
```

