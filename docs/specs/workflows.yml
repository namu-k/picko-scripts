## 5. 워크플로우 유형

### 5.1 에이전틱 워크플로우 (Agentic)

```yaml
name: agentic_pipeline
description: AI 자율 판단 기반 워크플로우

steps:
  # 소스 발견
  - name: discover_sources
    action: discovery.run
    args:
      account: socialbuilders
      keywords: ["AI", "startup", "technology"]
      platforms: ["reddit", "mastodon"]

  # 품질 검증 (QualityGraph)
  - name: verify_quality
    action: quality.verify
    dynamic_steps:
      # 품질 검증 결과에 따라 동적으로 단계 생성
      - name: generate_approved
        action: generator.run
        condition: "${{ steps.verify_quality.outputs.verified }}"

      - name: publish_approved
        action: publisher.run
        condition: "${{ steps.verify_quality.outputs.verified }}"
```

**특징**:
- QualityGraph를 통한 AI 자율 판단
- 동적 단계 생성
- 자동 분기 처리
- 신뢰도 기한 의사결정

### 5.2 일반 워크플로우 (Standard)

```yaml
name: daily_pipeline
description: 고정 순서 일일 파이프라인

steps:
  # 1. 수집
  - name: collect
    action: collector.run
    args:
      account: socialbuilders

  # 2. 중복 제거
  - name: dedup
    action: embedding.check_duplicate
    args:
      source: "${{ steps.collect.outputs.items }}"

  # 3. 생성 (조건부)
  - name: generate
    action: generator.run
    condition: "${{ vault.count('Inbox/Inputs', 'writing_status=auto_ready') > 0 }}"
    batch:
      source: "${{ vault.list('Inbox/Inputs', 'writing_status=auto_ready') }}"
      size: 5
      delay: 10s
```

**특징**:
- 순차적 실행
- 고정된 단계 순서
- 배치 처리 지원
- 조건부 실행

### 5.3 병렬 워크플로우

```yaml
name: parallel_processing
description: 병렬 처리 워크플로우

steps:
  # 병렬 처리 시작
  - name: process_longform
    action: generator.run
    args:
      account: socialbuilders
      type: longform
      items: "${{ vault.list('Inbox/Inputs', 'type=longform') }}"
    parallel: true

  - name: process_packs
    action: generator.run
    args:
      account: socialbuilders
      type: packs
      items: "${{ vault.list('Inbox/Inputs', 'type=packs') }}"
    parallel: true

  # 결과 집계
  - name: aggregate_results
    action: results.aggregate
    args:
      sources: [
        "${{ steps.process_longform.outputs.results }}",
        "${{ steps.process_packs.outputs.results }}"
      ]
```

