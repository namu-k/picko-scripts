# S4 — 단일 소스 집중 시나리오
# 목적: 한 소스만 사용해 수집→생성 전 구간을 검증. 소스별 특성(볼륨·에러 패턴) 파악.

id: S4
name: 단일 소스 집중
type: e2e
description: |
  소스 하나만 지정해 daily_collector → generate_content 실행.
  소스별 아이템 수·요약 품질·생성 안정성 비교용.

run:
  date: "2026-02-16"
  sources:
    - ai_news   # 또는 techcrunch, hacker_news 중 선택

commands:
  dry_run: |
    python -m scripts.daily_collector --date 2026-02-16 --sources ai_news --dry-run
  collect: |
    python -m scripts.daily_collector --date 2026-02-16 --sources ai_news
  generate: |
    python -m scripts.generate_content --date 2026-02-16
  validate: |
    python -m scripts.validate_output --path Content/Longform/ --recursive --verbose

expected_outputs:
  - Inbox/Inputs/_digests/
  - Inbox/Inputs/
  - Content/Longform/
  - Content/Packs/

metrics:
  - success_rate
  - error_retry_rate
  - duration
  - content_quality

notes: |
  sources를 techcrunch 또는 hacker_news로 바꿔 반복 실행하면 소스별 벤치마크 비교 가능.
