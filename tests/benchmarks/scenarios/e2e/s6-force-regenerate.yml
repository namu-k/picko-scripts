# S6 — 재생성(force) 시나리오
# 목적: 이미 생성된 롱폼/팩/이미지를 --force로 덮어쓸 때 동작·일관성 검증.

id: S6
name: 재생성(force)
type: e2e
description: |
  해당 날짜에 이미 생성된 콘텐츠가 있을 때 --force 옵션으로
  generate_content를 실행해 재생성. 덮어쓰기 안전성·결과 일관성 확인.

run:
  date: "2026-02-16"
  sources:
    - techcrunch
    - ai_news
  force: true

commands:
  collect: |
    python -m scripts.daily_collector --date 2026-02-16 --sources techcrunch ai_news
  generate: |
    python -m scripts.generate_content --date 2026-02-16 --force
  generate_longform_only: |
    python -m scripts.generate_content --date 2026-02-16 --type longform --force
  validate: |
    python -m scripts.validate_output --path Content/Longform/ --recursive --verbose

expected_outputs:
  - Content/Longform/ (기존 파일 갱신)
  - Content/Packs/
  - Assets/Images/_prompts/

metrics:
  - success_rate
  - error_retry_rate
  - duration
  - content_quality

notes: |
  먼저 S1 등으로 한 번 생성한 뒤, 프롬프트/모델 변경 후 S6로 재실행해 전후 비교에 활용.
