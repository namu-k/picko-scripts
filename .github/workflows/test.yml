name: Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.13']
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: 'requirements.txt'

    - name: Verify OPENAI_API_KEY is not in code
      run: |
        if grep -r "sk-" --include="*.py" --include="*.yml" --exclude-dir=".git" --exclude-dir=".venv" --exclude-dir="tests" --exclude-dir=".github" .; then
          echo "::error::Found potential API key in code!"
          exit 1
        fi
        echo "✓ No API keys found in source code"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install dev dependencies
      run: |
        pip install pytest pytest-cov flake8 mypy black isort

    - name: Install Playwright browsers
      run: |
        playwright install chromium
      continue-on-error: true

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 picko/ scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 picko/ scripts/ --count --exit-zero --max-complexity=18 --max-line-length=120 --statistics

    - name: Type check with mypy
      run: |
        mypy picko/ --config-file=pyproject.toml
      continue-on-error: true

    - name: Run pytest
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'dummy_key_for_testing' }}
      run: |
        pytest tests/ --cov=picko --cov-report=xml --cov-report=term --cov-report=json --cov-fail-under=0

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_on_ci_error: false

    - name: Upload pytest artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pytest-results-${{ matrix.python-version }}
        path: |
          .pytest_cache/
          coverage.xml
          coverage.json
        retention-days: 7

    - name: Security audit
      run: |
        pip install safety pip-audit
        safety check --json || true
        pip-audit --format json || true
      continue-on-error: true

  # Health check smoke test
  health-check:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run health_check (JSON output)
      env:
        OPENAI_API_KEY: dummy_key_for_testing
      run: |
        python -m scripts.health_check --json

    - name: Verify health check output
      run: |
        output=$(python -m scripts.health_check --json 2>&1 || true)
        echo "$output"
        # Basic validation that output is JSON-like
        if echo "$output" | grep -q "\["; then
          echo "✓ Health check JSON output verified"
        else
          echo "⚠ Health check may have failed, continuing..."
        fi
