name: Daily Health Check

on:
  schedule:
    # Daily at 8:00 AM UTC (4:00 PM KST)
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    if: github.repository == 'your-username/picko-scripts'  # Prevent fork runs
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run health check
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'dummy_key_for_testing' }}
        run: |
          python -m scripts.health_check --json > health_result.json
          cat health_result.json

      - name: Parse health check result
        id: health_parse
        run: |
          # Parse JSON and count failures
          python << 'EOF'
          import json
          import sys

          with open('health_result.json') as f:
              data = json.load(f)

          failed = sum(1 for item in data if not item.get('passed', True))
          total = len(data)

          # Set output for next step
          with open('health_summary.txt', 'w') as f:
              f.write(f"{failed}/{total} checks failed")

          print(f"Health check: {failed}/{total} failed")

          if failed > 0:
              print(f"Failed checks:")
              for item in data:
                  if not item.get('passed', True):
                      print(f"  - {item['name']}: {item['message']}")
              sys.exit(1)
          EOF

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const summary = await io.readFile('health_summary.txt', { encoding: 'utf-8' })
            const healthResult = await io.readFile('health_result.json', { encoding: 'utf-8' })

            const title = '🚨 Daily Health Check Failed'
            const body = `**Summary**: ${summary}

            **Failed Checks**:
            ${JSON.parse(healthResult).filter(x => !x.passed).map(x =>
              `- **${x.name}**: ${x.message}${x.details ? ` (${x.details})` : ''}`
            ).join('\n')}

            **Action Required**: Please investigate the failures.

            ---
            *Automated alert from daily health check workflow*`

            // Check for existing open issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.name,
              state: 'open',
              labels: ['health-check']
            })

            const existingIssue = issues.data.find(i => i.title.includes('Daily Health Check'))

            if (existingIssue) {
              // Update existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.name,
                issue_number: existingIssue.number,
                body: body
              })
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.name,
                title: title,
                body: body,
                labels: ['health-check', 'automated']
              })
            }
