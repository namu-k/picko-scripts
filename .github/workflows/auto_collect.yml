name: Daily Collection & Weekly Discovery

on:
  schedule:
    - cron: '0 23 * * *'    # 매일 08:00 KST (23:00 UTC 전일)
    - cron: '0 21 * * 0'    # 매주 일요일 06:00 KST (21:00 UTC 토요일)
  workflow_dispatch:          # 수동 실행 지원

jobs:
  daily-collect:
    if: github.event.schedule == '0 23 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run daily collector
        run: uv run python -m scripts.daily_collector --account socialbuilders
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          RELAY_API_KEY: ${{ secrets.RELAY_API_KEY }}

      - name: Commit results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: daily collection results"
          git push

  weekly-discover:
    if: github.event.schedule == '0 21 * * 0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run source discovery (dry-run)
        run: uv run python -m scripts.source_discovery --account socialbuilders --dry-run
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

      - name: Run source curator report
        run: uv run python -m scripts.source_curator --report
