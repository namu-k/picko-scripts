# Social Gradient Preset
# Bold, eye-catching theme for social media

name: social_gradient
extends: default

typography:
  font_family: "'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif"
  title_size: 56
  body_size: 30
  caption_size: 22
  title_weight: 800
  body_weight: 500
  line_height: 1.3

colors:
  primary: "#f97316"
  secondary: "#ec4899"
  background: "#0f0f23"
  surface: "#1e1e3f"
  text_primary: "#ffffff"
  text_secondary: "#fbbf24"
  text_muted: "#a855f7"
  accent: "#22d3ee"
  gradient: "linear-gradient(135deg, #f97316 0%, #ec4899 50%, #8b5cf6 100%)"
  overlay_color: "rgba(15, 15, 35, 0.7)"

spacing:
  body_padding: 60
  gap: 20
  section_gap: 32
  element_gap: 12
  border_radius: 24
  card_padding: 40

# Template-specific overrides
template_overrides:
  quote:
    typography:
      title_size: 64
      title_weight: 900
  social_quote:
    spacing:
      border_radius: 32
  modern_card:
    typography:
      title_size: 52
    colors:
      gradient: "linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%)"
  data:
    typography:
      title_size: 48
      body_size: 28
    colors:
      accent: "#fbbf24"
