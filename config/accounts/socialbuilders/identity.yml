identity:
  one_liner: "이 계정은 예비창업자~초기창업자가 아이템 검증 → MVP/출시 → 첫 유입/첫 매출 → PMF 전후 성장 → PMF 이후 스케일까지 실행 인사이트를 얻기 위해 보는 계정이다."
  target_audience:
    - "1차 타깃: 퇴사 예정/퇴사 직후 예비창업자(0→1)"
    - "2차 타깃: 초기창업자(1→10+) — 첫 유입/매출 부터 리텐션, PMF 전후 성장, PMF 이후 스케일"
    - "상태 키워드: 아이템 고민, 검증, MVP, 출시, 첫 유입, 첫 매출, PMF, 리텐션, CAC, LTV, 가격, 세일즈"
  value_proposition: "검증/출시뿐 아니라 획득→전환→리텐션→수익화까지 다음 행동으로 연결"
  pillars:
    - "P1: 아이디어/문제정의/시장 리서치(검증)"
    - "P2: MVP/제품/출시/실험(빌드)"
    - "P3: 성장(유통/마케팅/세일즈/가격)(그로스)"
    - "P4: 스케일업(지표/퍼널/리텐션/전환)(스케일)"
  tone_voice:
    tone: "짧게, 실행 중심, 과장 금지"
    forbidden: "무조건 성공, 보장, 단정적 법/세무/의료 조언"
    cta_style: "댓글로 질문/상황 남기기"
  boundaries:
    - "투자/주식/코인 수익 보장류"
    - "불법/회색지대 성장해킹"
    - "의료/법률/세무 단정 조언"
    - "정치/혐오/선동, 성인/도박"
