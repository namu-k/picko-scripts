# Dawn Mood Call Account Profile
# 새벽 감성 통화앱 계정 설정

# 계정 기본 정보
account_id: dawn_mood_call
name: "새벽감성"
description: "새벽 감성, 몽환적 분위기의 통화 앱"
one_liner: "새벽의 고요함 속에서 당신과 연결되는 특별한 순간"

# 타겟 오디언스
target_audience:
  - 20~30대 감성형 사용자
  - 야행/새벽 감성을 좋아하는 사람
  - 힐링/휴식을 원하는 사용자

# 가치 제안
value_proposition: "새벽 시간의 몽환적인 분위기 속에서 특별한 대화를 나누세요"

# 스타일 참조
style_name: dreamy_dawn

# 관심 주제
interests:
  primary:
    - 새벽 감성
    - 몽환적 분위기
    - 감성 통화
    - 힐링
    - 밤/새벽 무드
    - 도시 야경
    - 일출/일몰
  secondary:
    - 로맨틱
    - 휴식
    - 멍때리기
    - 명상
    - 감성 사진

# 키워드 가중치
keywords:
  high_relevance:
    - 새벽
    - 감성
    - 몽환
    - 통화
    - 밤
    - 달빛
    - 고요
    - 일출
  medium_relevance:
    - 도시
    - 야경
    - 일출
    - 휴식
  low_relevance:
    - 트렌드
    - 뉴스

# 신뢰 소스
trusted_sources:
  - Pexels
  - Unsplash
  - Pinterest

# 채널별 설정
channels:
  instagram:
    enabled: true
    max_length: 2200
    tone: "감성적, 시적, 여운 있는, 몽환적인"
    hashtags:
      - "#새벽감성"
      - "#몽환"
      - "#감성통화"
      - "#새벽"

  tiktok:
    enabled: true
    max_length: 150
    tone: "짧고 감성적인 한 줄, 몽환적인"
    hashtags:
      - "#새벽"
      - "#감성"
      - "#몽환"

# 콘텐츠 생성 설정
content_settings:
  use_exploration: false
  apply_reference_style: true
  generate_packs: true
  generate_image_prompts: true

# 비주얼/레이아웃 설정
visual_settings:
  default_layout_preset: minimal_dark
  channel_layouts:
    instagram:
      spacing:
        body_padding: 60
    tiktok:
      spacing:
        body_padding: 50
