# Vault 경로
vault:
  root: "c:/picko-scripts/mock_vault"
  inbox: "Inbox/Inputs"
  digests: "Inbox/Inputs/_digests"
  content: "Content"
  longform: "Content/Longform"
  packs: "Content/Packs"
  assets: "Assets"
  images_prompts: "Assets/Images/_prompts"
  archive: "Archive"
  logs_publish: "Logs/Publish"

# LLM 설정 (기본/호환용)
llm:
  provider: "openai"
  model: "gpt-4o-mini"
  temperature: 0.7
  max_tokens: 4000
  api_key_env: "OPENAI_API_KEY"

# 요약/태깅용 LLM 설정 (로컬 우선)
summary_llm:
  provider: "ollama"  # ollama | openai | anthropic | openrouter
  model: "deepseek-r1:7b"  # qwen2.5:7b | deepseek-r1:7b | llama3.3:70b
  temperature: 0.3
  max_tokens: 1000
  base_url: "http://localhost:11434"
  # 로컬 실패 시 폴백
  fallback_provider: "openai"
  fallback_model: "gpt-4o-mini"
  fallback_api_key_env: "OPENAI_API_KEY"

# 글쓰기용 LLM 설정 (클라우드)
# OpenRouter 사용 예시:
#   provider: "openrouter"
#   model: "openai/gpt-4o-mini"
#   api_key_env: "OPENROUTER_API_KEY"
writer_llm:
  provider: "openai"  # openai | anthropic | openrouter
  model: "gpt-4o-mini"  # gpt-4o-mini | claude-3.5-sonnet | openai/gpt-4o-mini (openrouter)
  temperature: 0.8
  max_tokens: 2000
  api_key_env: "OPENAI_API_KEY"

# 임베딩 설정 (로컬 우선)
embedding:
  provider: "local"  # local | ollama | openai
  model: "BAAI/bge-m3"  # BAAI/bge-m3 | BAAI/bge-base-en-v1.5 | sentence-transformers/all-MiniLM-L6-v2
  dimensions: 1024  # bge-m3: 1024, bge-base-en-v1.5: 768, all-MiniLM-L6-v2: 384
  device: "cpu"  # cpu | cuda
  cache_enabled: true
  cache_dir: "cache/embeddings"
  # 로컬 실패 시 폴백
  fallback_provider: "openai"
  fallback_model: "text-embedding-3-small"
  fallback_api_key_env: "OPENAI_API_KEY"

# 점수 계산 설정
scoring:
  weights:
    novelty: 0.3
    relevance: 0.4
    quality: 0.3
  thresholds:
    auto_approve: 0.85
    auto_reject: 0.3
    minimum_display: 0.4

# 로깅 설정
logging:
  level: "INFO"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {name} | {message}"
  dir: "logs"
  retention_days: 30

# 소스 설정 (별도 파일 참조)
sources_file: "config/sources.yml"

# 계정 프로필 디렉토리
accounts_dir: "config/accounts"

# 처리 설정
processing:
  batch_size: 10
  max_retries: 3
  retry_delay_seconds: 5
  request_timeout_seconds: 30
