# Vault 경로 (상대 경로면 프로젝트 루트 기준)
vault:
  root: "mock_vault"
  inbox: "Inbox/Inputs"
  digests: "Inbox/Inputs/_digests"
  content: "Content"
  longform: "Content/Longform"
  packs: "Content/Packs"
  assets: "Assets"
  images_prompts: "Assets/Images/_prompts"
  archive: "Archive"
  logs_publish: "Logs/Publish"

# LLM 설정 (기본/호환용)
llm:
  provider: "relay" # "openai"
  model: "gpt-4o-mini"
  temperature: 0.7
  max_tokens: 4000
  api_key_env: "RELAY_API_KEY" # "OPENAI_API_KEY"

# 요약/태깅용 LLM 설정 (로컬 우선)
summary_llm:
  provider: "ollama"  # ollama | openai | anthropic | openrouter
  model: "qwen2.5:3b"  # qwen2.5:7b | deepseek-r1:7b | llama3.3:70b
  temperature: 0.3
  max_tokens: 1000
  base_url: "http://localhost:11434"
  # 로컬 실패 시 폴백
  fallback_provider: "relay" # "openai"
  fallback_model: "gpt-4o-mini"
  fallback_api_key_env: "RELAY_API_KEY" # "OPENAI_API_KEY"

# 글쓰기용 LLM 설정 (클라우드)
# OpenRouter 사용 예시:
#   provider: "openrouter"
#   model: "openai/gpt-4o-mini"
#   api_key_env: "OPENROUTER_API_KEY"
writer_llm:
  provider: "relay" # "openai"  # openai | anthropic | openrouter
  model: "gpt-4o-mini"  # gpt-4o-mini | claude-3.5-sonnet | openai/gpt-4o-mini (openrouter)
  temperature: 0.8
  max_tokens: 2000
  api_key_env: "RELAY_API_KEY" # "OPENAI_API_KEY"

# 임베딩 설정 (Ollama 우선)
embedding:
  provider: "ollama"  # ollama | local | openai
  model: "qwen3-embedding:0.6b"  # mxbai-embed-large:1024, qwen3-embedding:0.6b
  dimensions: 1024  # mxbai-embed-large: 1024, qwen3-embedding: 1024
  base_url: "http://localhost:11434"
  cache_enabled: true
  cache_dir: "cache/embeddings"
  # 로컬 실패 시 폴백
  fallback_provider: "local"
  fallback_model: "BAAI/bge-m3"
  fallback_device: "cpu"

# 점수 계산 설정
scoring:
  weights:
    novelty: 0.3
    relevance: 0.4
    quality: 0.3
    freshness: 0.15  # 추가: 신선도 가중치 (총합 1.15 → 정규화)
    auto_approve: 0.85
    auto_reject: 0.3
    minimum_display: 0.4

# 로깅 설정
logging:
  level: "INFO"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {name} | {message}"
  dir: "logs"
  retention_days: 30

# 소스 설정 (별도 파일 참조)
sources_file: "config/sources.yml"

# 계정 프로필 디렉토리
accounts_dir: "config/accounts"

# 처리 설정
processing:
  batch_size: 10
  max_retries: 3
  retry_delay_seconds: 5
  request_timeout_seconds: 30

# 생성 설정
generation:
  auto_validate: true

# 중복 탐지 설정
deduplication:
  embedding_threshold: 0.92

# ─────────────────────────────────────────────────────────────
# 품질 검증 설정 (007-agentic)
# ─────────────────────────────────────────────────────────────
quality:
  enabled: true  # 롤백 플래그: false 시 품질 검증 비활성화
  primary:
    model: "gpt-4o-mini"  # 1차 검증용 LLM
  cross_check:
    model: "claude-3-5-sonnet-20241022"  # 2차 교차 검증용 LLM (다른 모델 권장)
  final:
    auto_approve_threshold: 0.85  # 이 이상 시 자동 승인
  feedback:
    enabled: true  # 피드백 루프 활성화

# ─────────────────────────────────────────────────────────────
# 알림 설정 (007-agentic)
# ─────────────────────────────────────────────────────────────
notification:
  provider: "telegram"  # telegram | slack
  review_timeout_hours: 72  # 미응답 시 자동 거절 시간
