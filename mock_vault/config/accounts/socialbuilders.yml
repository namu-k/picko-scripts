# 소셜빌더스 계정 프로필

account:
  id: "socialbuilders"
  name: "소셜빌더스"
  description: "AI/테크 트렌드 큐레이션 채널"

# 관심 주제 (relevance 점수 계산에 사용)
interests:
  primary:
    - "AI/머신러닝"
    - "스타트업"
    - "생산성 도구"
    - "노코드/로우코드"
  secondary:
    - "디자인"
    - "마케팅 자동화"
    - "SaaS"

# 키워드 가중치
keywords:
  high_relevance:
    - "ChatGPT"
    - "Claude"
    - "Notion"
    - "자동화"
    - "AI 에이전트"
  medium_relevance:
    - "생산성"
    - "스타트업"
    - "펀딩"
  low_relevance:
    - "테크"
    - "앱"

# 채널별 톤앤매너
channels:
  twitter:
    max_length: 280
    tone: "casual"
    hashtags: true
  linkedin:
    max_length: 1500
    tone: "professional"
    hashtags: false
  newsletter:
    max_length: 5000
    tone: "informative"
    sections: ["intro", "main", "takeaway"]
