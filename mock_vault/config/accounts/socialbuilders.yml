# Social Builders Account Profile
# 소셜 미디어 채널별 콘텐츠 설정

name: Social Builders
description: AI/테크 콘텐츠 큐레이션 계정
target_audience:
  - 개발자
  - AI 연구자
  - 테크 리더

# 관심 주제 (relevance scoring용) - dict 구조
interests:
  primary:
    - artificial intelligence
    - machine learning
    - software development
  secondary:
    - tech trends
    - startup

# 키워드 가중치 (relevance scoring용)
keywords:
  high_relevance:
    - AI
    - GPT
    - LLM
    - deep learning
  medium_relevance:
    - productivity
    - automation
  low_relevance:
    - news
    - trends

# 신뢰 소스 (quality scoring용)
trusted_sources:
  - TechCrunch
  - arXiv
  - GitHub

channels:
  twitter:
    name: Twitter/X
    max_length: 280
    tone: casual
    hashtags: true
    emoji: true
    call_to_action: "링크 확인 👇"
    image_specs:
      aspect_ratio: "16:9"
      style: "minimal-card"
      layout_hints:
        - text-overlay
        - brand-colors
        - clean-typography
      recommended_size: "1200x675"

  linkedin:
    name: LinkedIn
    max_length: 700
    tone: professional
    hashtags: true
    emoji: false
    call_to_action: "자세히 보기"
    image_specs:
      aspect_ratio: "1:1"
      style: "professional"
      layout_hints:
        - clean
        - data-visualization
        - corporate
      recommended_size: "1200x1200"

  instagram:
    name: Instagram
    max_length: 500
    tone: casual
    hashtags: true
    emoji: true
    call_to_action: "프로필 링크 확인"
    image_specs:
      aspect_ratio: "1:1"
      style: "vibrant"
      layout_hints:
        - eye-catching
        - gradient-background
        - bold-text
      recommended_size: "1080x1080"

  threads:
    name: Threads
    max_length: 500
    tone: casual
    hashtags: true
    emoji: true
    call_to_action: "댓글로 의견 남겨주세요"
    image_specs:
      aspect_ratio: "4:5"
      style: "casual"
      layout_hints:
        - authentic
        - minimal-text
        - lifestyle
      recommended_size: "1080x1350"

  newsletter:
    name: Newsletter
    max_length: 1000
    tone: professional
    hashtags: false
    emoji: false
    call_to_action: "전체 글 보기"
    image_specs:
      aspect_ratio: "16:9"
      style: "editorial"
      layout_hints:
        - hero-image
        - headline-overlay
        - consistent-branding
      recommended_size: "1200x675"
